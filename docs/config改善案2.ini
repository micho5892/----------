完全移行（main.py の引数から **kwargs を撤廃し、SimConfig を直接受け取る形にする）を実現するための具体的な3ステップを解説します。

これを完了すると、実行ファイル上で SimConfig(
と打った瞬間にすべての引数の説明・デフォルト値がポップアップするようになり、型間違いも実行前に教えてくれる最強の開発環境になります！

Step 1: config.py に足りないパラメータを追加する

現在、main.py の中で kwargs.pop("max_time_p", 10.0) のように「SimConfig
を経由せずに直接取り出している変数」がいくつかあります。これらをすべて
SimConfig のフィールドとして登録します。

config.py の SimConfig クラス内に以下を追加してください。

    # === main.py で pop していた制御パラメータたちを追加 ===
    max_time_p: float = Field(10.0, description="シミュレーションの最大実行時間（秒）")
    ramp_time_p: float = Field(1.0, description="立ち上げ時間（秒）。この時間は外力が徐々に強くなる")
    
    # 定常判定（Steady Detection）関連
    steady_detection: bool = Field(True, description="定常状態を自動検知して早期終了するか")
    steady_window_p: float = Field(1.0, description="定常検知の判定ウィンドウ（秒）")
    steady_tolerance: float = Field(0.001, description="定常検知の許容誤差割合")
    steady_extra_p: float = Field(2.0, description="定常検知後の追加実行時間（秒）")

    # 可視化・動作モード関連
    target_video_fps: Optional[float] = Field(None, description="出力動画の目標FPS（指定時は vis_interval が自動計算される）")
    visualization_mode: Literal["realtime", "offline", "none"] = Field("realtime", description="可視化モード")
    visualization_queue_size: int = Field(8, description="非同期可視化のキューサイズ")
    visualization_drop_policy: Literal["drop_oldest", "drop_newest"] = Field("drop_oldest")

    # データエクスポート関連
    data_export_interval: int = Field(0, description="機械学習用データの保存間隔（0で無効）")
    data_export_start_p: float = Field(5.0, description="データ保存を開始する物理時間（秒）")

    # ディレクトリ・状態管理
    state: Dict[str, Any] = Field(default_factory=dict, description="状態維持用の辞書")
    artifact_parent: Optional[str] = Field(None, description="結果を出力する親ディレクトリ")
    paths_out: Optional[Dict[str, Any]] = Field(None, description="パス結果を呼び出し元に返すための辞書")
    vti_dir: Optional[str] = Field(None, description="明示的なVTI出力ディレクトリ")

Step 2: main.py の引数と受け取り処理を書き換える

main.py の run_simulation 関数を以下のように書き換えます。kwargs を廃止し、引数で直接 cfg を受け取るようにします。

from config import SimConfig  # ★先頭付近でインポートしておく

# ★変更: **kwargs をやめて、型ヒント付きで cfg を受け取る
def run_simulation(cfg: SimConfig):
    import taichi as ti

    _script_dir = os.path.dirname(os.path.abspath(__file__))
    if _script_dir not in sys.path:
        sys.path.insert(0, _script_dir)

    # Taichi の初期化
    _ti_initialized = False
    
    # -------------------------------------------------------------
    # ▼ ここにあった kwargs.pop(...) の数十行の処理はすべて削除！ ▼
    # 代わりに、cfg から直接値を取り出すように変えます。
    # -------------------------------------------------------------

    benchmark = cfg.benchmark_name
    state = cfg.state
    
    # 出力先ディレクトリの設定
    timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
    run_subdir = f"{benchmark}_{timestamp}"

    if cfg.artifact_parent is not None:
        ap = str(cfg.artifact_parent).strip() or "results"
        os.makedirs(ap, exist_ok=True)
        out_dir = os.path.join(ap, run_subdir)
    elif cfg.out_dir is not None:
        out_dir = cfg.out_dir
    else:
        out_dir = os.path.join("results", run_subdir)
    os.makedirs(out_dir, exist_ok=True)

    vti_dir = cfg.vti_dir if cfg.vti_dir is not None else os.path.join(out_dir, "vti")
    os.makedirs(vti_dir, exist_ok=True)

    # アニメーション拡張子の補正（cfg のプロパティを使う）
    anim_ext = ".mp4" if cfg.output_format == "mp4" else ".gif"
    if cfg.filename == "output.gif": # デフォルト値なら上書き
        cfg.filename = os.path.join(out_dir, f"{benchmark}_{timestamp}{anim_ext}")
    
    log_path = os.path.join(out_dir, f"{benchmark}_{timestamp}.log")
    
    # ...（中略：以降は、今までのコードにあった `max_time_p` を `cfg.max_time_p` に書き換えるなど、変数名を cfg. に合わせるだけで動きます）

Step 3: 完全移行後の「実行ファイル」の書き方

完全移行すると、実行スクリプト（例：run_mpemba.py）の書き方が非常に美しく、わかりやすくなります。

以下が、新しい実行スクリプトの書き方です。

from config import SimConfig
from main import run_simulation

def main():
    # ★ ここで `SimConfig(` と打つと、VSCode上で
    # 「nx: X方向のグリッド数」「max_time_p: 最大実行時間」などの説明がポップアップします！
    
    cfg = SimConfig(
        benchmark_name="mpemba_effect",
        nx=128,
        ny=128,
        nz=32,
        max_time_p=20.0,            # 20秒まで計算
        steady_detection=False,     # 今回は定常検知をオフにする
        visualization_mode="none",  # 動画を作らず計算を高速化
        
        # 階層化されたサブ設定は辞書で渡す
        render={
            "vti_export_interval": 50, # ParaView用にVTIを50ステップごとに出力
            "output_format": "mp4"
        },
        
        # 物理・境界条件など（今まで通り）
        domain_properties={ ... },
        boundary_conditions={ ... },
        physics_models={ ... }
    )

    # 実行！（安全な Pydantic モデルをそのまま渡す）
    run_simulation(cfg)

if __name__ == "__main__":
    main()

完全移行による絶大なメリット

1.  マニュアル不要:
    今後、数ヶ月ぶりにシミュレーションを触るときや、他の人にコードを渡すときに、「このパラメータって何だっけ？どういう値が正解？」という疑問がすべて
    VSCode 上のポップアップ（Pydanticの description）で解決します。
2.  クラッシュの事前防止: nx="128" や max_time_p=-5.0 のようなタイポ・間違いを入力した瞬間に、プログラムが走り出す前に
    ValidationError で親切に教えてくれます。「数時間計算した後にエラーで落ちた」という悲劇を防ぎます。
3.  コードが劇的にスッキリする: main.py の最初を占領していた kwargs
    の解体作業やデフォルト値の設定が消滅し、純粋な「シミュレーションの実行ロジック」だけになります。
