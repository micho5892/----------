パラメータの変数説明をクラスにまとめて、引数設定のときにチェックできるようにする。

Step 1: config.py を Pydantic モデルに書き換える

現在の SimConfig を、Pydantic の BaseModel を継承したクラスに書き換えます。
大量のパラメータをフラットに並べず、設定の「種類ごと」に小さなモデル（クラス）に分けて階層化するのが「最強の設計」のコツです。

config.py を以下のように書き換えます（または config_pydantic.py として新設します）。

import math
import taichi as ti
from pydantic import BaseModel, Field, ConfigDict, model_validator
from typing import Dict, Any, List, Optional, Literal

# --- 1. 階層化するための小さなモデル群 ---

class RenderConfig(BaseModel):
    """可視化・出力に関する設定"""
    vis_interval: int = Field(20, ge=1, description="可視化のステップ間隔")
    filename: str = Field("output.gif", description="出力ファイル名")
    output_format: Literal["gif", "mp4"] = Field("gif", description="出力フォーマット")
    vti_export_interval: int = Field(0, ge=0, description="VTI出力間隔(0で無効)")
    vti_path_template: str = Field('results/step_{:06d}.vti')

class ParticleConfig(BaseModel):
    """パーティクル（流線確認用）に関する設定"""
    n_particles: int = Field(10000, ge=0)
    particles_inject_per_step: int = Field(200, ge=0)

# --- 2. メインのコンフィグモデル ---

class SimConfig(BaseModel):
    """シミュレーションの全設定を管理するPydanticモデル"""
    
    # Pydantic v2 の設定：未定義の引数が来たら無視する（互換性のため）
    model_config = ConfigDict(extra='ignore')

    # 基本設定
    benchmark_name: str = Field("unknown", description="ベンチマーク名")
    fp_dtype_str: Literal["float32", "float16"] = Field(
        "float32", alias="fp_dtype", description="浮動小数点の精度"
    )
    
    # 空間グリッド設定
    nx: int = Field(128, gt=0)
    ny: int = Field(128, gt=0)
    nz: int = Field(32, gt=0)
    Lx_p: float = Field(0.1, gt=0.0, description="X方向の物理長[m]")
    
    # サブモデルを組み込む（階層化）
    render: RenderConfig = Field(default_factory=RenderConfig)
    particles: ParticleConfig = Field(default_factory=ParticleConfig)

    # 物理・境界条件などの辞書データ（より厳密にするならここもモデル化可能）
    boundary_conditions: Dict[str, Any] = Field(default_factory=dict)
    physics_models: Dict[str, Any] = Field(default_factory=dict)
    domain_properties: Dict[str, Any] = Field(default_factory=dict)

    # 流速・時間設定
    U_inlet_p: float = Field(1.0, description="代表物理流速")
    u_lbm_inlet: float = Field(0.1, description="LBM単位での代表流速")
    
    # --- 3. 自動計算されるプロパティ (Computed Properties) ---
    # Python標準の @property を使うことで、今まで通り `cfg.dx` のようにアクセスできる
    @property
    def fp_dtype(self):
        return ti.f32 if self.fp_dtype_str == "float32" else ti.f16

    @property
    def dx(self) -> float:
        return self.Lx_p / self.nx

    @property
    def dt(self) -> float:
        return self.dx * self.u_lbm_inlet / self.U_inlet_p

    # --- 4. バリデーションと初期化後の自動補正 ---
    @model_validator(mode='after')
    def auto_compute_u_lbm(self) -> 'SimConfig':
        """inletの速度設定から最大LBM流速を自動取得する（元の処理の再現）"""
        max_u = 0.0
        for bc_id, bc_info in self.boundary_conditions.items():
            if bc_info.get("type") == "inlet":
                v = bc_info.get("velocity", [0.0, 0.0, 0.0])
                v_mag = max(abs(v[0]), abs(v[1]), abs(v[2]))
                if v_mag > max_u:
                    max_u = float(v_mag)
        if max_u > 0.0:
            self.u_lbm_inlet = max_u
            
        # Particlesのデフォルト値補正（元の logic の再現）
        if self.particles.particles_inject_per_step == 200: # デフォルトのままなら
             self.particles.particles_inject_per_step = max(1, self.particles.n_particles // 50)
             
        return self

    # 旧コード互換のための材料取得メソッド（そのまま残す）
    def get_materials_dict(self):
        mat_dict = {}
        # ... (元のロジックをそのまま貼り付け) ...
        return mat_dict

【ここが最強ポイント】

  - Field(..., gt=0) などの記述により、解像度にマイナス値が入るなどのミスを実行直前に検知できます。
  - Taichiの ti.f32 などは Pydantic に直接入れられないため、文字列 ("float32") で受けて @property
    で変換するテクニックを使っています。
  - @model_validator
    を使うことで、「設定された境界条件から流速を自動計算する」といった複雑なロジックを、モデルの初期化時に自動で走らせることができます。

Step 2: main.py の run_simulation インターフェースの改修

main.py は、**「**kwargs で受け取ったものを Pydantic
に変換する」**だけのラッパーに変更します。これでUI側は一切修正せずに済みます。

# main.py の変更部分

def run_simulation(**kwargs):
    import taichi as ti
    # ... (ti.init などの処理) ...

    # =======================================================
    # 【追加】kwargs を Pydantic モデルに変換 (バリデーション実行)
    # =======================================================
    from config import SimConfig  # Pydantic版をインポート
    
    try:
        # Pydantic に投げることで、型チェックとデフォルト値の補完が自動で行われる
        cfg = SimConfig(**kwargs)
    except Exception as e:
        print(f"パラメータ設定エラー: {e}")
        return False
        
    # main.py の処理で使用する変数を Pydantic モデルから取り出す
    benchmark = cfg.benchmark_name
    data_export_interval = kwargs.get("data_export_interval", 0) # Pydanticに入れていない変数は今まで通りgetで抜く
    max_time_p = kwargs.get("max_time_p", 10.0)
    
    # ... (ロガーの設定など) ...

    # Pydanticモデルを各クラスに渡す
    import config as config_mod
    config_mod.TI_FLOAT = cfg.fp_dtype
    ctx = SimulationContext(cfg.nx, cfg.ny, cfg.nz, cfg.particles.n_particles, cfg.fp_dtype)
    ctx.set_materials(cfg.get_materials_dict())

    # シミュレータ類にも渡す
    sim = LBMSimulator(cfg)
    bc_manager = BoundaryManager(sim.d3q19, cfg)
    
    # === 注意 ===
    # 以降の main.py 内の `cfg.vis_interval` などは
    # `cfg.render.vis_interval` や `cfg.particles.n_particles` のように
    # 階層化してアクセスするように書き換えます。

Step 3: IDE (VSCodeなど) の恩恵を受ける

このリファクタリングを行うと、VSCode 上で cfg. と打った瞬間に、nx や dx, render.vis_interval
などの候補がズラッと並び、それぞれの Field(description="...")
で書いた説明文がポップアップで表示されるようになります。

また、今まで「どこで初期化されたか分からない変数（例: kwargs.pop('sponge_thickness', 0.0)）」が main.py
内に散らばっていたものが、すべて config.py の Pydantic
モデル内に集約されるため、「このシミュレーションにはどんなパラメータが存在するのか」が一目瞭然になります。

今後の展開（UIとの完全統合）

この基盤ができたら、lbm_ui_designer 側で Pydantic の SimConfig.model_json_schema()
を呼び出すだけで、UIの設定画面を自動生成したり、UIから出力された JSON を
SimConfig.model_validate_json(json_str) で一発で安全に読み込めるようになります。

まずは config.py を Pydantic ベースに書き換えるところからスタートしてみてください！
